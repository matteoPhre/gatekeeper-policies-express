name: Manual Password Check

on:
  workflow_dispatch:
    inputs:
      password:
        description: Password to validate
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate password
        env:
          INPUT_PASSWORD: ${{ inputs.password }}
        run: node scripts/validate-password.mjs
